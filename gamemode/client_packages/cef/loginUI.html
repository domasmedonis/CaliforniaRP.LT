<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sora:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: transparent !important;
            background-color: rgba(0, 0, 0, 0) !important;
        }

        :root {
            --panel: rgba(248, 255, 251, 0.96);
            --panel-soft: rgba(240, 252, 246, 0.96);
            --text: #1c2a25;
            --muted: #60726b;
            --accent: #84c9a2;
            --accent-hover: #73b893;
            --line: rgba(120, 156, 140, 0.35);
            --danger: #d14949;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            display: grid;
            place-items: center;
            overflow: hidden;
            background: rgba(243, 251, 247, 0.22) !important;
            background-color: rgba(243, 251, 247, 0.22) !important;
            padding: 20px;
        }

        .ui-shell {
            width: min(940px, 95vw);
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 14px;
            align-items: stretch;
            position: relative;
        }

        .login-container {
            width: 100%;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: linear-gradient(160deg, rgba(253, 255, 254, 0.96), rgba(242, 251, 246, 0.94));
            box-shadow: 0 16px 38px rgba(10, 28, 20, 0.22);
            padding: 28px 24px;
            animation: riseIn 0.75s ease-out;
            position: relative;
            z-index: 1;
        }

        .side-panel {
            border-radius: 18px;
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(250, 255, 252, 0.95), rgba(238, 250, 244, 0.94));
            box-shadow: 0 16px 34px rgba(10, 28, 20, 0.16);
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .side-chip {
            border: 1px solid rgba(136, 174, 156, 0.35);
            border-radius: 12px;
            padding: 12px;
            background: rgba(244, 252, 248, 0.96);
        }

        .chip-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #5f7b71;
            margin-bottom: 5px;
        }

        .chip-value {
            font-size: 15px;
            font-weight: 600;
            color: #22362e;
            line-height: 1.3;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid rgba(125, 172, 149, 0.45);
            background: linear-gradient(145deg, rgba(157, 220, 186, 0.45), rgba(229, 248, 238, 0.95));
            display: grid;
            place-items: center;
            font-family: 'Fraunces', Georgia, serif;
            font-size: 22px;
            font-weight: 700;
            color: #2f624d;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .brand-meta {
            line-height: 1.15;
        }

        .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: #1f312a;
            letter-spacing: 0.01em;
        }

        .brand-tag {
            margin-top: 3px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #5f7b71;
        }

        .hero-title {
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(34px, 4vw, 46px);
            line-height: 1.08;
            margin: 0;
            color: #1f3129;
        }

        .hero-sub {
            margin: 10px 0 24px;
            font-size: 14px;
            color: var(--muted);
        }

        .loginInfo {
            width: 100%;
            max-width: 100%;
        }

        .form-title {
            display: none;
        }

        .form-subtitle {
            display: none;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #60776d;
            margin: 0 0 8px;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid var(--line);
            font-size: 14px;
            color: #1e2f28;
            background: rgba(255, 255, 255, 0.75);
            outline: none;
            transition: border-color 0.22s ease, box-shadow 0.22s ease;
        }

        input::placeholder {
            color: #7d9088;
        }

        input:focus {
            border-color: rgba(132, 201, 162, 0.9);
            box-shadow: 0 0 0 4px rgba(132, 201, 162, 0.28);
        }

        .button-wrap {
            margin-top: 22px;
        }

        button {
            width: 100%;
            min-height: 52px;
            border-radius: 13px;
            text-align: center;
            padding: 14px 24px;
            background: linear-gradient(145deg, #9ad8b5, #84c9a2);
            color: #214131;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.01em;
            box-shadow: 0 12px 24px rgba(44, 108, 79, 0.22);
            border: none;
            outline: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(145deg, #8cd0ac, #75bc96);
            transform: translateY(-1px);
            box-shadow: 0 14px 26px rgba(35, 96, 68, 0.25);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 8px 16px rgba(24, 60, 39, 0.2);
        }

        button.loading {
            opacity: 0.82;
            pointer-events: none;
        }

        #error-message {
            margin-top: 14px;
            font-size: 13px;
            border-radius: 10px;
            padding: 10px 12px;
            color: #7b2424;
            background: rgba(255, 214, 214, 0.84);
            border: 1px solid rgba(209, 73, 73, 0.4);
            display: none;
        }

        .hint {
            margin-top: 14px;
            color: #60766c;
            font-size: 12px;
            text-align: center;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.99);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 980px) {
            .ui-shell {
                width: min(430px, 94vw);
                grid-template-columns: 1fr;
            }

            .login-container {
                padding: 22px 18px;
            }

            .side-panel {
                order: 2;
                padding: 12px;
                display: grid;
                grid-template-columns: repeat(3, minmax(90px, 1fr));
                gap: 8px;
            }

            .brand-name {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="ui-shell">
        <div class="login-container">
            <div class="loginInfo">
                <div class="brand-row">
                    <div class="logo-mark">C</div>
                    <div class="brand-meta">
                        <div class="brand-name">CaliforniaRP.LT</div>
                        <div class="brand-tag">Premium roleplay experience</div>
                    </div>
                </div>

                <h1 class="hero-title">Prisijungimas</h1>
                <p class="hero-sub">Prisijunkite ir testi zaidima su gyvu miesto vaizdu fone.</p>

                <div class="input-group">
                    <label class="input-label" for="username">UCP vartotojo vardas</label>
                    <input type="text" id="username" autocomplete="username" placeholder="pvz. Vardenis123">
                </div>

                <div class="input-group">
                    <label class="input-label" for="password">Slaptazodis</label>
                    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
                </div>

                <div class="button-wrap"><button id="login-btn" onclick="submitLogin()">Prisijungti</button></div>
                <div id="error-message"></div>
                <p class="hint">Spauskite Enter greitam prisijungimui.</p>
            </div>
        </div>

        <aside class="side-panel">
            <div class="side-chip">
                <div class="chip-label">Serveris</div>
                <div class="chip-value">CaliforniaRP.LT</div>
            </div>
            <div class="side-chip">
                <div class="chip-label">Rekomendacija</div>
                <div class="chip-value">Rasykite pilna UCP varda</div>
            </div>
            <div class="side-chip">
                <div class="chip-label">Saugumas</div>
                <div class="chip-value">Neatskleiskite slaptažodzio</div>
            </div>
        </aside>
    </div>

    <script>
        function showErrorMessage(message) {
            const errorText = document.getElementById('error-message');
            errorText.innerText = message;
            errorText.style.display = "block";
        }

        function submitLogin() {
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            const errorText = document.getElementById('error-message');
            const loginButton = document.getElementById('login-btn');

            const username = usernameField.value.trim();
            const password = passwordField.value.trim();

            if (!username || !password) {
                showErrorMessage("Iveskite vartotojo varda ir slaptazodi.");
                return;
            }

            errorText.style.display = "none";
            loginButton.classList.add('loading');
            loginButton.innerText = 'Jungiama...';

            mp.trigger('login:submit', username, password);

            setTimeout(() => {
                loginButton.classList.remove('loading');
                loginButton.innerText = 'Prisijungti';
            }, 1600);
        }

        function hideLoginUI() {
            const root = document.documentElement;
            const body = document.body;

            if (body) {
                body.style.opacity = '0';
                body.style.pointerEvents = 'none';
                setTimeout(() => {
                    body.style.display = 'none';
                }, 120);
            }

            if (root) {
                root.style.background = 'transparent';
            }

            mp.trigger('login:hideCursor');
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                submitLogin();
            }
        });
    </script>

</body>

</html>
