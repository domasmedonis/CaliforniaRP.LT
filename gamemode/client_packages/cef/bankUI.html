<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banko Sistema</title>
    <style>
        :root {
            --bg-start: #171d2f;
            --bg-end: #101521;
            --panel: #f4f7fb;
            --text-primary: #141a29;
            --text-secondary: #68718b;
            --accent: #27d6ad;
            --accent-deep: #15b18c;
            --danger: #f05d65;
            --ink: #111827;
            --line: #dbe3ef;
            --card-dark: #1b243a;
            --radius-lg: 24px;
            --radius-md: 14px;
            --shadow: 0 24px 60px rgba(4, 10, 25, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Bahnschrift", "Segoe UI", "Tahoma", sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: transparent;
            overflow: hidden;
        }

        .bank-shell {
            width: min(980px, 98vw);
            min-height: min(88vh, 760px);
            border-radius: 32px;
            background: var(--panel);
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1.2fr 0.95fr;
            overflow: hidden;
            transform: translateY(10px);
            animation: enter 420ms ease-out forwards;
        }

        .left {
            padding: 26px;
            background: linear-gradient(180deg, #f7f9fd 0%, #eef3f9 100%);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .right {
            padding: 24px;
            background: linear-gradient(180deg, #1b243a 0%, #131b2f 100%);
            color: #e7edf9;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .balance-card {
            position: relative;
            border-radius: var(--radius-lg);
            background:
                radial-gradient(circle at 90% 5%, rgba(255, 255, 255, 0.2), transparent 36%),
                linear-gradient(130deg, #21d8af 0%, #32b3f0 120%);
            color: #073227;
            padding: 24px;
            min-height: 190px;
            overflow: hidden;
        }

        .balance-card::after {
            content: "";
            position: absolute;
            right: -40px;
            bottom: -60px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.22);
        }

        .bank-title {
            margin: 0;
            font-size: 16px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.75;
        }

        .total-amount {
            margin: 14px 0 2px;
            font-size: clamp(36px, 6vw, 48px);
            font-weight: 700;
            letter-spacing: 0.01em;
            color: #08251f;
        }

        .cash-line {
            margin: 0;
            font-size: 15px;
            color: rgba(7, 50, 39, 0.76);
            position: relative;
            z-index: 1;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .quick-btn {
            border: 0;
            border-radius: var(--radius-md);
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(18, 29, 54, 0.18);
        }

        .quick-btn.deposit {
            background: #e6fff8;
            color: #0a6d57;
        }

        .quick-btn.withdraw {
            background: #ffeef0;
            color: #a7323c;
        }

        .quick-btn.close {
            background: #1c2946;
            color: #d7e0f5;
        }

        .quick-btn.ghost {
            background: #dfe7f4;
            color: #28334f;
        }

        .card-block {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
        }

        .block-title {
            margin: 0 0 10px;
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .input,
        .action-btn {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
        }

        .input {
            background: #fbfcff;
            color: var(--ink);
        }

        .input:focus {
            outline: none;
            border-color: #8fb1ea;
            box-shadow: 0 0 0 3px rgba(76, 126, 214, 0.15);
        }

        .action-btn {
            border: 0;
            cursor: pointer;
            font-weight: 700;
            transition: filter 180ms ease;
        }

        .action-btn:hover {
            filter: brightness(1.05);
        }

        .action-btn.transfer {
            background: linear-gradient(130deg, var(--accent), var(--accent-deep));
            color: #08251f;
        }

        .tx-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .tx-head h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .tx-count {
            font-size: 13px;
            color: #9fb2dd;
        }

        .history {
            border-radius: 16px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            height: 100%;
            overflow-y: auto;
        }

        .empty {
            margin: 14px 4px;
            color: #9cadce;
            font-size: 14px;
        }

        .transaction {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 11px 12px;
            margin-bottom: 8px;
            animation: reveal 240ms ease both;
        }

        .transaction-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
        }

        .transaction-type {
            font-weight: 700;
            font-size: 14px;
            color: #f0f4ff;
        }

        .transaction-date {
            font-size: 12px;
            color: #a8b6d7;
            margin-top: 3px;
        }

        .transaction-amount {
            font-size: 15px;
            font-weight: 700;
        }

        .transaction.deposit .transaction-amount,
        .transaction.transfer_in .transaction-amount {
            color: #65f0ca;
        }

        .transaction.withdraw .transaction-amount,
        .transaction.transfer_out .transaction-amount {
            color: #ff8f98;
        }

        .status {
            min-height: 20px;
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            color: #ff9199;
        }

        .status.success {
            color: #6df0c9;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 920px) {
            body {
                padding: 10px;
            }

            .bank-shell {
                grid-template-columns: 1fr;
                min-height: 94vh;
                border-radius: 24px;
            }

            .right {
                min-height: 42vh;
            }

            .quick-actions {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <div class="bank-shell">
        <section class="left">
            <article class="balance-card">
                <p class="bank-title">Jusu balansas</p>
                <p class="total-amount" id="balance">$0</p>
                <p class="cash-line">Grynieji: <span id="cash">$0</span></p>
            </article>

            <div class="card-block">
                <p class="block-title">Grynuju operacijos</p>
                <div class="form-grid">
                    <input class="input" type="number" id="amount" placeholder="Suma, pvz. 500" min="1" step="1">
                    <div class="quick-actions">
                        <button class="quick-btn deposit" onclick="bankAction('deposit')">Inesti</button>
                        <button class="quick-btn withdraw" onclick="bankAction('withdraw')">Issiimti</button>
                    </div>
                </div>
            </div>

            <div class="card-block">
                <p class="block-title">Pervedimas</p>
                <div class="form-grid">
                    <input class="input" type="text" id="recipient" placeholder="Gavejo vardas">
                    <input class="input" type="number" id="transferAmount" placeholder="Suma pervedimui" min="1"
                        step="1">
                    <button class="action-btn transfer" onclick="sendTransfer()">Siusti pinigus</button>
                </div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn ghost" onclick="refreshTransactionView()">Atnaujinti istorija</button>
                <button class="quick-btn close" onclick="closeBankUI()">Uzdaryti</button>
            </div>
        </section>

        <section class="right">
            <div class="tx-head">
                <h3>Paskutines operacijos</h3>
                <span class="tx-count" id="txCount">0 irasu</span>
            </div>
            <p class="status" id="error"></p>
            <div class="history" id="history">
                <p class="empty">Dar nera operaciju.</p>
            </div>
        </section>
    </div>

    <script>
        let cachedTransactions = [];

        function formatMoney(value) {
            return `$${Number(value || 0).toLocaleString('en-US')}`;
        }

        function updateBankBalance(balance) {
            document.getElementById('balance').innerText = formatMoney(balance);
        }

        function updateCash(cash) {
            const cashEl = document.getElementById('cash');
            if (cashEl) {
                cashEl.innerText = formatMoney(cash);
            }
        }

        function showBankError(message, success = false) {
            const errorEl = document.getElementById('error');
            errorEl.innerText = message || '';
            errorEl.classList.toggle('success', Boolean(success));
        }

        function getTypeLabel(type) {
            if (type === 'deposit') return 'Inesta';
            if (type === 'withdraw') return 'Issiimta';
            if (type === 'transfer_in') return 'Gauta';
            if (type === 'transfer_out') return 'Issiusta';
            return 'Operacija';
        }

        function getAmountPrefix(type) {
            if (type === 'withdraw' || type === 'transfer_out') return '-';
            return '+';
        }

        function renderHistory(transactions) {
            const historyDiv = document.getElementById('history');
            const txCount = document.getElementById('txCount');
            historyDiv.innerHTML = '';

            if (!transactions.length) {
                historyDiv.innerHTML = '<p class="empty">Dar nera operaciju.</p>';
                txCount.innerText = '0 irasu';
                return;
            }

            txCount.innerText = `${transactions.length} irasu`;

            transactions.slice(0, 30).forEach((transaction, index) => {
                const transactionDate = new Date(transaction.date || Date.now());
                const formattedDate = transactionDate.toLocaleString('lt-LT');
                const type = transaction.transaction_type || 'deposit';

                const transactionElement = document.createElement('div');
                transactionElement.className = `transaction ${type}`;
                transactionElement.style.animationDelay = `${Math.min(index * 28, 220)}ms`;
                transactionElement.innerHTML = `
                    <div class="transaction-row">
                        <span class="transaction-type">${getTypeLabel(type)}</span>
                        <span class="transaction-amount">${getAmountPrefix(type)}${formatMoney(transaction.amount)}</span>
                    </div>
                    <div class="transaction-date">${formattedDate}</div>
                `;

                historyDiv.appendChild(transactionElement);
            });
        }

        function updateTransactionHistory(history) {
            let transactions = history;
            if (typeof history === 'string') {
                try {
                    transactions = JSON.parse(history);
                } catch (err) {
                    transactions = [];
                }
            }

            if (!Array.isArray(transactions)) {
                transactions = [];
            }

            cachedTransactions = transactions;
            renderHistory(cachedTransactions);
        }

        function refreshTransactionView() {
            renderHistory(cachedTransactions);
            showBankError('Istorija atnaujinta.', true);
        }

        function bankAction(type) {
            const amount = Number(document.getElementById('amount').value);
            if (!amount || amount <= 0) {
                showBankError('Iveskite teisinga suma.');
                return;
            }

            showBankError('Vykdoma operacija...');
            mp.trigger('bankAction', type, String(amount));
        }

        function sendTransfer() {
            const recipient = document.getElementById('recipient').value.trim();
            const amount = Number(document.getElementById('transferAmount').value);

            if (!recipient) {
                showBankError('Iveskite gavejo varda.');
                return;
            }

            if (!amount || amount <= 0) {
                showBankError('Iveskite teisinga pervedimo suma.');
                return;
            }

            showBankError('Pervedimas vykdomas...');
            mp.trigger('bankTransfer', recipient, String(amount));
        }

        function onTransferResult(success, message) {
            showBankError(message || '', Boolean(success));
            if (success) {
                document.getElementById('recipient').value = '';
                document.getElementById('transferAmount').value = '';
            }
        }

        function closeBankUI() {
            mp.trigger('closeBankUI');
        }

        function toggleHistory() {
            refreshTransactionView();
        }
    </script>
</body>

</html>
